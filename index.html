<!DOCTYPE html>
  <html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>QuantVerse - BTCUSDT Quant Trading Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030712;
            --bg-card: #0f172a;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.2);
            --green: #10b981;
            --green-glow: rgba(16, 185, 129, 0.1);
            --red: #ef4444;
                          --red-glow: rgba(239, 68, 68, 0.1);
            --text: #f8fafc;
                          --text-secondary: #94a3b8;
            --border: #1e293b;
            --border-glow: #334155;
            --radius: 12px;
            --font-main: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
}
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: var(--font-main); overflow-x: hidden; }
        header { 
                      height: 64px; border-bottom: 1px solid var(--border); 
            display: flex; align-items: center; justify-content: space-between; padding: 0 24px;
            background: rgba(3, 7, 18, 0.8); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 50;
}
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo-text { font-weight: 800; font-size: 18px; letter-spacing: -0.5px; }
        .logo-text span { color: var(--accent); }
        .main-grid { display: grid; grid-template-columns: 1fr 320px; gap: 16px; padding: 16px; }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
        .price-val { font-size: 32px; font-weight: 800; font-family: var(--font-mono); margin: 10px 0; }
        canvas { width: 100%; height: 300px; }
        .scorecard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .score-item { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 8px; border: 1px solid var(--border); }
        .score-label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; }
        .score-value { font-size: 16px; font-weight: 700; font-family: var(--font-mono); margin-top: 4px; }
    </style>
      </head>
      <body>
          <header>
              <div class="logo">
                  <div class="logo-text">QUANT<span>VERSE</span></div>
                  <div id="status" class="status-dot"></div>
              </div>
              <div class="header-price">
                  <div id="price" class="price-val">BTC $---,---</div>
              </div>
          </header>
          <main class="main-grid">
              <div class="left-col">
                  <div class="card">
                      <canvas id="priceChart"></canvas>
                  </div>
                  <div class="card" style="margin-top:16px;">
                      <canvas id="equityChart"></canvas>
                  </div>
              </div>
              <div class="right-col">
                  <div class="card">
                      <h3>Quant Scorecard</h3>
                      <div class="scorecard">
                          <div class="score-item"><div class="score-label">GARCH Vol</div><div id="garch-val" class="score-value">---</div><div id="garch-sig" class="score-label">---</div></div>
                          <div class="score-item"><div class="score-label">Hurst Exp</div><div id="hurst-val" class="score-value">---</div><div id="hurst-sig" class="score-label">---</div></div>
                          <div class="score-item"><div class="score-label">Fisher Transform</div><div id="fisher-val" class="score-value">---</div><div id="fisher-sig" class="score-label">---</div></div>
                          <div class="score-item"><div class="score-label">OU Z-Score</div><div id="ou-val" class="score-value">---</div><div id="ou-sig" class="score-label">---</div></div>
                          <div class="score-item"><div class="score-label">Kelly Opt</div><div id="kelly-val" class="score-value">---</div><div id="kelly-sig" class="score-label">---</div></div>
                          <div class="score-item"><div class="score-label">Entropy</div><div id="shannon-val" class="score-value">---</div><div id="shannon-sig" class="score-label">---</div></div>
                      </div>
                  </div>
              </div>
          </main>
          <script src="quant-strategies.js"></script>
          <script src="chart-renderer.js"></script>
          <script src="app.js"></script>
      </body>
      </html>
